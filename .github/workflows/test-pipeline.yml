name: Test Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    
    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: weight_monitor_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:password@localhost:5432/weight_monitor_test
      REDIS_URL: redis://localhost:6379/0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Setup database
        run: bin/rails db:setup

      - name: Check front-end (Asset Precompilation)
        run: bundle exec rails assets:precompile

      - name: Download master coverage artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          branch: master
          name: coverage
          path: coverage
        continue-on-error: true

      - name: Run tests & coverage check
        run: bundle exec rspec

      - name: Upload coverage results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

      - name: Generate Coverage Badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          ruby -r json -r net/http -e '
            last_run = JSON.parse(File.read("coverage/.last_run.json"))
            coverage = last_run.dig("result", "line").round(2)
            color = if coverage >= 90; "brightgreen"; elsif coverage >= 80; "yellow"; else; "red"; end
            url = "https://img.shields.io/badge/coverage-#{coverage}%25-#{color}"
            svg = Net::HTTP.get(URI(url))
            Dir.mkdir(".github/badges") unless Dir.exist?(".github/badges")
            File.write(".github/badges/coverage.svg", svg)
          '

      - name: Commit coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update coverage badge [skip ci]"
          file_pattern: '.github/badges/coverage.svg'
